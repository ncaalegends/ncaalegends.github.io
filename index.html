<main id="main" class="picker-page">

  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-stripe"></div>

  </div>

  <!-- Cards are built by the script below from each league's own
       league-data.js, so the week shown here can never disagree
       with the week shown on the league's own page. -->

    <p class="sched-empty" id="picker-loading">Loading leagues&hellip;</p>
  </div>

</main>

<footer class="site-footer">
  <div class="footer-status">NCAA LEGENDS · THREE ONLINE DYNASTIES</div>
  <!-- Written out rather than built by script.js: this page has its
       own inline script and never loads it. The league pages get the
       same link from renderFooter(). -->
  <div class="footer-links">
    <a href="admin/">Commissioner tools</a>
  </div>
</footer>

<script>
/* ============================================================
   LEAGUE PICKER
   ------------------------------------------------------------
   Each card's week comes from that league's league-data.js — the
   same file its own page reads. Nothing about season state is
   duplicated here, so the picker can't drift out of sync.

   Those files are plain top-level `const` declarations meant for a
   <script> tag, not modules. Fetching the text and running it
   inside a Function body gives each one its own scope, which is
   what makes it safe to load all three despite every file
   declaring identically-named constants.
   ============================================================ */
/* Single source of truth, shared with the header switcher. */
const LEAGUES = SITE_LEAGUES.map((l) => ({ slug: l.dir, ...l }));

const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function weekLabel(week) {
  if (week === "PRESEASON") return "Preseason";
  if (week === 14) return "Week 14 · Army-Navy";
  if (week === 15) return "Week 15 · Championships";
  return `Week ${week}`;
}

async function loadLeague(slug) {
  const res = await fetch(`${slug}/league-data.js`, { cache: "no-cache" });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const src = await res.text();
  return new Function(
    `${src}\nreturn { SEASON, LEAGUE_INFO, COACHES };`
  )();
}

function cardHtml(meta, data, failed) {
  const coaches = failed ? null : (data.COACHES || []).length;
  const week = failed ? "Unavailable" : weekLabel(data.SEASON.currentWeek);
  const status = failed ? "" : (data.SEASON.statusLine || "");

  return `
    <a class="picker-card" href="${meta.slug}/" style="--team:${meta.accent}">
      <span class="picker-bar"></span>
      <span class="picker-body">
        <span class="picker-label">${esc(meta.label)}</span>
        <span class="picker-week">${esc(week)}</span>
        ${status ? `<span class="picker-status">${esc(status)}</span>` : ""}
        ${coaches !== null ? `<span class="picker-meta">${coaches} coaches</span>` : ""}
      </span>
      <span class="picker-go" aria-hidden="true">&rarr;</span>
    </a>`;
}

(async function initPicker() {
  const grid = document.getElementById("picker-grid");

  /* Settled, not all — one league's data file failing to load must
     not blank the whole picker. A failed card still links through. */
  const results = await Promise.allSettled(LEAGUES.map((l) => loadLeague(l.slug)));

  grid.innerHTML = LEAGUES.map((meta, i) => {
    const r = results[i];
    if (r.status === "rejected") {
      console.warn(`[picker] ${meta.slug} data failed to load:`, r.reason);
      return cardHtml(meta, null, true);
    }
    return cardHtml(meta, r.value, false);
  }).join("");
})();
</script>
